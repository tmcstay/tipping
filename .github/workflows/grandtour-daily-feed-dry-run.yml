name: GrandTour Daily Feed Dry Run

on:
  schedule:
    - cron: '30 19 * * *'
  workflow_dispatch:
    inputs:
      provider:
        description: 'Feed provider name'
        required: false
        default: 'manual-json'
      import_type:
        description: 'Import type for the workflow run'
        required: false
        default: 'daily'
      backfill:
        description: 'Legacy backfill toggle for compatibility'
        required: false
        default: 'false'
      source_file:
        description: 'Optional source file path relative to the repo root'
        required: false
      report_file:
        description: 'Optional report file name in the report directory'
        required: false
        default: 'grandtour-feed-dry-run.json'
      from_stage:
        description: 'Start stage number for backfill range'
        required: false
      to_stage:
        description: 'End stage number for backfill range'
        required: false
      all_completed:
        description: 'Backfill all completed stages from the source file'
        required: false
        default: 'false'

jobs:
  dry-run:
    name: Daily feed dry run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run GrandTour feed dry run
        env:
          # Scheduled (cron) runs always use the official-letour provider with no
          # explicit stage range, so the script auto-resolves "today's" completed
          # stage from the TDF 2026 stage calendar (data/cycling/tdf/2026/stages_2026_tdf.csv).
          # Manual workflow_dispatch runs keep explicit control over provider/stage inputs.
          FEED_PROVIDER: ${{ github.event_name == 'schedule' && 'official-letour' || (github.event.inputs.provider || 'manual-json') }}
          IMPORT_TYPE: ${{ github.event.inputs.import_type || 'daily' }}
          BACKFILL: ${{ github.event.inputs.backfill || 'false' }}
          FEED_SOURCE_FILE: ${{ github.event.inputs.source_file || '' }}
          REPORT_FILE: ${{ github.event.inputs.report_file || 'grandtour-feed-dry-run.json' }}
          FROM_STAGE: ${{ github.event_name == 'schedule' && '' || (github.event.inputs.from_stage || '') }}
          TO_STAGE: ${{ github.event_name == 'schedule' && '' || (github.event.inputs.to_stage || '') }}
          ALL_COMPLETED: ${{ github.event.inputs.all_completed || 'false' }}
        run: |
          mkdir -p report
          # Persist REPORT_FILE beyond this step; a step-level `env:` value does not
          # carry over to the later upload-artifact step's ${{ env.REPORT_FILE }} lookup.
          echo "REPORT_FILE=$REPORT_FILE" >> "$GITHUB_ENV"
          # NOTE: --apply is never passed here. Scheduled and manual runs are dry-run only;
          # apply mode remains guarded/disabled in grandtour-feed-import.mjs regardless.
          args=(--provider "$FEED_PROVIDER" --report "report/$REPORT_FILE")
          if [ -n "$FEED_SOURCE_FILE" ]; then
            args+=(--source-file "$FEED_SOURCE_FILE")
          fi
          if [ "$IMPORT_TYPE" = "backfill" ] || [ "$BACKFILL" = "true" ]; then
            args+=(--backfill)
          fi
          if [ "$ALL_COMPLETED" = "true" ]; then
            args+=(--all-completed)
          fi
          if [ -n "$FROM_STAGE" ]; then
            args+=(--from-stage "$FROM_STAGE")
          fi
          if [ -n "$TO_STAGE" ]; then
            args+=(--to-stage "$TO_STAGE")
          fi
          npm run grandtour:feed:dry-run -- "${args[@]}"

      - name: Upload feed report artifact
        uses: actions/upload-artifact@v4
        with:
          name: grandtour-feed-dry-run-report
          path: report/${{ env.REPORT_FILE }}
