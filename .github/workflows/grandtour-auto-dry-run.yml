name: GrandTour Automatic Results Collection (Dry Run)

# Automatic GrandTour results collection: fetch + reconcile official results
# and produce a report for admin review. This workflow NEVER applies,
# finalises, or scores production data - see scripts/grandtour-auto-dry-run.mjs
# and scripts/grandtour-feed-import.mjs. Apply/finalise/score remain
# separate, manually-gated admin actions (docs/GRANDTOUR_APPLY_MODE_PRODUCTION_READINESS_CHECKLIST.md).
#
# Retry behaviour (scripts/grandtour-auto-dry-run.mjs): the wrapper itself
# retries, not this workflow - a single job runs the wrapper once, and the
# wrapper's own retry loop (1 initial attempt + up to max_retries retries,
# retry_interval_minutes apart) runs INSIDE that one job/step. Only
# transient technical failures (network/HTTP/Supabase connectivity) are
# retried; unsafe/semantic outcomes (parser drift, unmatched/ambiguous
# riders, missing jersey holders, invalid input, missing credentials) stop
# immediately on the first attempt and are never retried.
#
# Parameter resolution (`Resolve effective parameters` step below): every
# input this job uses is resolved ONCE, early, into step outputs - never
# scattered as `github.event.inputs.*` throughout the run command. This
# matters because `github.event.inputs.*` is ONLY populated for a
# workflow_dispatch event; on a `schedule` event every one of those
# expressions evaluates to an empty string. The resolution step branches
# explicitly on `github.event_name` and applies the documented scheduled
# defaults itself, rather than relying on `||` fallback chains sprinkled
# through env: blocks (which look like they handle the schedule case, but
# in practice only mask - inconsistently - a small subset of variables).
#
# Scheduled runs execute ONLY the default-branch (main) copy of this
# workflow file and the scripts it invokes - GitHub Actions always
# evaluates `schedule` triggers from the version of the workflow on the
# repository's default branch, never from any other branch, regardless of
# what's merged elsewhere. A `workflow_dispatch` run, by contrast, uses
# whatever ref it's launched against (normally also main, but can be
# pointed at another branch/tag deliberately from the "Run workflow" UI).
#
# Schedule: 17:17 UTC daily. To change the schedule, edit the single
# `cron:` line below - GitHub Actions cron cannot be altered from
# workflow_dispatch inputs at run time, so this is the only way to change
# the recurring time. Ad hoc/one-off runs with different behaviour (a
# specific stage, different retry settings, etc.) should use "Run workflow"
# (workflow_dispatch) instead of editing this file.
on:
  schedule:
    # 17:17 UTC daily. See the note above before changing this.
    - cron: '17 17 * * *'
  workflow_dispatch:
    inputs:
      grand_tour_name:
        description: 'Grand tour name (must match grand_tours.name)'
        required: false
        default: 'Tour de France'
      grand_tour_year:
        description: 'Grand tour year (must match grand_tours.year)'
        required: false
        default: '2026'
      provider:
        description: 'Feed provider name'
        required: false
        default: 'official-letour'
      stage_number:
        description: 'Optional: run a single stage number (takes priority over from/to_stage, and over auto-resolution)'
        required: false
      from_stage:
        description: 'Optional: start stage number for a range'
        required: false
      to_stage:
        description: 'Optional: end stage number for a range'
        required: false
      fail_on_unsafe:
        description: 'Fail the workflow if the final report is unsafe/needs review (parser drift, safeToApply=false, etc.) - never affects retry behaviour, only the exit code'
        required: false
        default: 'true'
      retry_interval_minutes:
        description: 'Minutes to wait between retry attempts (transient failures only)'
        required: false
        default: '15'
      max_retries:
        description: 'Maximum number of retry attempts after the initial attempt (0-8+; "max retries 8" = 1 initial + 8 retries = 9 attempts total)'
        required: false
        default: '8'
      no_retry:
        description: 'Disable retries entirely - perform exactly one attempt regardless of the outcome'
        required: false
        default: 'false'
      stage_availability_grace_hours:
        description: 'Hours after a stage starts_at before it is considered eligible for automatic dry-run (only used when stage_number/from_stage/to_stage are blank)'
        required: false
        default: '12'
      allow_rerun_completed:
        description: 'Allow auto-resolution to re-select a stage that is already finalised (only used when stage_number/from_stage/to_stage are blank) - normally left false so completed stages are never re-checked automatically'
        required: false
        default: 'false'

# One automatic-collection run per grand tour/year at a time. A second
# scheduled or manual run for the SAME grand tour/year queues behind an
# already-running one rather than running concurrently (duplicate letour.fr
# requests / duplicate retry loops for the same daily collection) - and
# does NOT cancel the in-progress run just because a new one was
# triggered, since a manual dispatch part-way through an automatic retry
# loop should never discard attempts already in progress. A run for a
# different grand tour/year (a genuinely different `group`) runs
# independently, unaffected.
#
# This is the one place `github.event.inputs.*` is still read directly
# (with its own `||` fallback) rather than through the resolved-parameters
# step below: the `concurrency:` block is evaluated by GitHub Actions
# before any job or step runs, so it cannot reference step outputs.
concurrency:
  group: grandtour-auto-dry-run-${{ github.event.inputs.grand_tour_name || 'Tour de France' }}-${{ github.event.inputs.grand_tour_year || '2026' }}
  cancel-in-progress: false

jobs:
  auto-dry-run:
    name: Automatic dry-run collection (with retries)
    runs-on: ubuntu-latest
    # 1 initial attempt + up to 8 retries * 15 minutes waiting = up to 120
    # minutes of pure waiting, plus per-attempt processing time (checkout/
    # install/fetch/reconcile, repeated up to 9 times). 180 minutes gives a
    # healthy margin over the worst case (default settings); a manual
    # dispatch with larger retry_interval_minutes/max_retries than the
    # defaults could still exceed this - GitHub's own maximum job timeout
    # is 360 minutes if that's ever needed.
    timeout-minutes: 180

    # Job-level so both the mail step's `if:` guard and the "SMTP not
    # configured" notice step below can read the same values. GitHub
    # Actions `if:` expressions cannot safely reference `secrets.*`
    # directly (there is no reliable "is this secret set" check against the
    # secrets context) - env vars are the documented way to gate a step on
    # whether a secret was actually provided. `with:` values on the mail
    # step itself still reference `secrets.*` directly (that's fine and
    # normal - only `if:` needs the env-var indirection).
    env:
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Resolve effective parameters
        id: params
        # Resolves every effective input into a step output, ONCE, here -
        # nothing downstream reads github.event.inputs.* directly. On a
        # `schedule` event, github.event.inputs is entirely empty (not
        # merely blank strings - the whole object is absent), so this
        # branches explicitly on github.event_name and applies the
        # documented scheduled defaults itself rather than leaning on `||`
        # fallbacks that would silently produce the same *coincidental*
        # result for some inputs and a wrong one for others (e.g. an
        # empty-but-"set" required-looking value).
        env:
          EVENT_NAME: ${{ github.event_name }}
          IN_GRAND_TOUR_NAME: ${{ github.event.inputs.grand_tour_name }}
          IN_GRAND_TOUR_YEAR: ${{ github.event.inputs.grand_tour_year }}
          IN_PROVIDER: ${{ github.event.inputs.provider }}
          IN_STAGE_NUMBER: ${{ github.event.inputs.stage_number }}
          IN_FROM_STAGE: ${{ github.event.inputs.from_stage }}
          IN_TO_STAGE: ${{ github.event.inputs.to_stage }}
          IN_FAIL_ON_UNSAFE: ${{ github.event.inputs.fail_on_unsafe }}
          IN_RETRY_INTERVAL_MINUTES: ${{ github.event.inputs.retry_interval_minutes }}
          IN_MAX_RETRIES: ${{ github.event.inputs.max_retries }}
          IN_NO_RETRY: ${{ github.event.inputs.no_retry }}
          IN_STAGE_AVAILABILITY_GRACE_HOURS: ${{ github.event.inputs.stage_availability_grace_hours }}
          IN_ALLOW_RERUN_COMPLETED: ${{ github.event.inputs.allow_rerun_completed }}
        run: |
          if [ "$EVENT_NAME" = "schedule" ]; then
            # Hard defaults for scheduled runs - never read github.event.inputs.*
            # (it does not exist on this event at all).
            grand_tour_name='Tour de France'
            grand_tour_year='2026'
            provider='official-letour'
            stage_number=''
            from_stage=''
            to_stage=''
            fail_on_unsafe='true'
            retry_interval_minutes='15'
            max_retries='8'
            no_retry='false'
            stage_availability_grace_hours='12'
            allow_rerun_completed='false'
          else
            # workflow_dispatch: use the supplied input, falling back to the
            # same defaults as the scheduled run when an optional input was
            # left blank.
            grand_tour_name="${IN_GRAND_TOUR_NAME:-Tour de France}"
            grand_tour_year="${IN_GRAND_TOUR_YEAR:-2026}"
            provider="${IN_PROVIDER:-official-letour}"
            stage_number="$IN_STAGE_NUMBER"
            from_stage="$IN_FROM_STAGE"
            to_stage="$IN_TO_STAGE"
            fail_on_unsafe="${IN_FAIL_ON_UNSAFE:-true}"
            retry_interval_minutes="${IN_RETRY_INTERVAL_MINUTES:-15}"
            max_retries="${IN_MAX_RETRIES:-8}"
            no_retry="${IN_NO_RETRY:-false}"
            stage_availability_grace_hours="${IN_STAGE_AVAILABILITY_GRACE_HOURS:-12}"
            allow_rerun_completed="${IN_ALLOW_RERUN_COMPLETED:-false}"
          fi

          if [ -n "$stage_number" ]; then
            auto_resolution_used='false'
          elif [ -n "$from_stage" ] && [ -n "$to_stage" ]; then
            auto_resolution_used='false'
          else
            auto_resolution_used='true'
          fi

          {
            echo "grand_tour_name=$grand_tour_name"
            echo "grand_tour_year=$grand_tour_year"
            echo "provider=$provider"
            echo "stage_number=$stage_number"
            echo "from_stage=$from_stage"
            echo "to_stage=$to_stage"
            echo "fail_on_unsafe=$fail_on_unsafe"
            echo "retry_interval_minutes=$retry_interval_minutes"
            echo "max_retries=$max_retries"
            echo "no_retry=$no_retry"
            echo "stage_availability_grace_hours=$stage_availability_grace_hours"
            echo "allow_rerun_completed=$allow_rerun_completed"
            echo "auto_resolution_used=$auto_resolution_used"
          } >> "$GITHUB_OUTPUT"

      - name: Print trigger diagnostics
        # Never prints secrets - only event metadata and the resolved,
        # already-public (non-secret) parameters from the step above.
        env:
          RESOLVED_JSON: ${{ toJSON(steps.params.outputs) }}
        run: |
          echo "=== GrandTour auto dry-run: trigger diagnostics ==="
          echo "Event: ${{ github.event_name }}"
          echo "Git ref: ${{ github.ref }}"
          echo "Default branch: ${{ github.event.repository.default_branch }}"
          echo "Current UTC timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "This is a scheduled run - GitHub Actions always evaluates schedule triggers from the default-branch copy of this workflow file, regardless of what is merged elsewhere."
          fi
          echo "Effective provider: ${{ steps.params.outputs.provider }}"
          echo "Effective grand tour: ${{ steps.params.outputs.grand_tour_name }} ${{ steps.params.outputs.grand_tour_year }}"
          echo "Supplied stage number: ${{ steps.params.outputs.stage_number || '(none)' }}"
          echo "Supplied stage range: ${{ steps.params.outputs.from_stage || '(none)' }}-${{ steps.params.outputs.to_stage || '(none)' }}"
          echo "Auto-resolution will be used: ${{ steps.params.outputs.auto_resolution_used }}"
          echo "Stage availability grace hours: ${{ steps.params.outputs.stage_availability_grace_hours }}"
          echo "Allow rerun completed: ${{ steps.params.outputs.allow_rerun_completed }}"
          echo "Effective fail-on-unsafe: ${{ steps.params.outputs.fail_on_unsafe }}"
          echo "Effective retry settings: interval=${{ steps.params.outputs.retry_interval_minutes }}m max_retries=${{ steps.params.outputs.max_retries }} no_retry=${{ steps.params.outputs.no_retry }}"
          echo "Full resolved parameters (JSON): $RESOLVED_JSON"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          # Node 20 has no native WebSocket support, and @supabase/supabase-js's
          # createClient() throws synchronously when constructing its Realtime
          # client without one (no `ws` package is installed as a fallback
          # here) - this workflow always runs --reconcile, so it always
          # constructs a Supabase client. Node 22+ has native WebSocket;
          # kept at 24 to match the rest of this project's tooling.
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run GrandTour automatic dry-run collection (with retries)
        id: auto_dry_run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          GRAND_TOUR_NAME: ${{ steps.params.outputs.grand_tour_name }}
          GRAND_TOUR_YEAR: ${{ steps.params.outputs.grand_tour_year }}
          FEED_PROVIDER: ${{ steps.params.outputs.provider }}
          STAGE_NUMBER: ${{ steps.params.outputs.stage_number }}
          FROM_STAGE: ${{ steps.params.outputs.from_stage }}
          TO_STAGE: ${{ steps.params.outputs.to_stage }}
          FAIL_ON_UNSAFE: ${{ steps.params.outputs.fail_on_unsafe }}
          RETRY_INTERVAL_MINUTES: ${{ steps.params.outputs.retry_interval_minutes }}
          MAX_RETRIES: ${{ steps.params.outputs.max_retries }}
          NO_RETRY: ${{ steps.params.outputs.no_retry }}
          STAGE_AVAILABILITY_GRACE_HOURS: ${{ steps.params.outputs.stage_availability_grace_hours }}
          ALLOW_RERUN_COMPLETED: ${{ steps.params.outputs.allow_rerun_completed }}
        run: |
          # NOTE: --apply is never passed here, and this script never
          # finalises or scores - see scripts/grandtour-auto-dry-run.mjs.
          # Only SUPABASE_URL + SUPABASE_ANON_KEY/SUPABASE_PUBLISHABLE_KEY
          # are used; SUPABASE_SERVICE_ROLE_KEY is never read by this workflow.
          args=(
            --grand-tour-name "$GRAND_TOUR_NAME"
            --grand-tour-year "$GRAND_TOUR_YEAR"
            --provider "$FEED_PROVIDER"
            --fail-on-unsafe "$FAIL_ON_UNSAFE"
            --retry-interval-minutes "$RETRY_INTERVAL_MINUTES"
            --max-retries "$MAX_RETRIES"
            --stage-availability-grace-hours "$STAGE_AVAILABILITY_GRACE_HOURS"
            --report-dir tmp/auto-dry-runs
          )
          if [ -n "$STAGE_NUMBER" ]; then
            args+=(--stage-number "$STAGE_NUMBER")
          elif [ -n "$FROM_STAGE" ] && [ -n "$TO_STAGE" ]; then
            args+=(--from-stage "$FROM_STAGE" --to-stage "$TO_STAGE")
          fi
          if [ "$NO_RETRY" = "true" ]; then
            args+=(--no-retry)
          fi
          if [ "$ALLOW_RERUN_COMPLETED" = "true" ]; then
            args+=(--allow-rerun-completed)
          fi
          # The wrapper's own retry loop runs entirely inside this one step -
          # its stdout already includes, per attempt: attempt number/max
          # attempts, UTC start time, stage selected, failure classification,
          # whether it's retryable, and the next retry time; and, at the end,
          # a FINAL SUMMARY covering every attempt (parser status,
          # parserDriftDetected, safeToApply/overallSafeToApply, blockers,
          # result line count, jersey holder count, jersey fetch metadata,
          # and finalStatus - exactly one of: success, no_eligible_stage,
          # unsafe_review_required, parser_drift, configuration_error,
          # transient_failure_exhausted, unexpected_failure).
          node scripts/grandtour-auto-dry-run.mjs "${args[@]}"

      - name: Print final summary
        # Runs regardless of the previous step's outcome - the whole point
        # is surfacing the final-summary.json (which the previous step also
        # already prints to its own log) as a distinct, easy-to-find block,
        # including for a failed/exhausted/unsafe run, not just a clean one.
        # Each job checkout is a fresh workspace, so there is exactly one
        # run directory (and one final-summary.json) to find here.
        #
        # A scheduled run that finds no eligible stage is a normal daily
        # outcome, not a broken workflow - its finalStatus will read
        # "no_eligible_stage" and the job step above exits 0, so this run
        # is NOT reported as a GitHub Actions failure.
        id: final_summary
        if: always()
        run: |
          summary_file=$(find tmp/auto-dry-runs -maxdepth 2 -name final-summary.json 2>/dev/null | head -n 1)
          if [ -n "$summary_file" ]; then
            echo "=== final-summary.json ($summary_file) ==="
            cat "$summary_file"
            echo "summary_file=$summary_file" >> "$GITHUB_OUTPUT"
          else
            echo "No final-summary.json was produced (the run likely failed before a run directory was created - see the resolved parameters and trigger diagnostics above)."
          fi

      - name: Build admin notification email
        # Turns final-summary.json into a plain-English email for the admin
        # (scripts/grandtour-auto-dry-run-notify.mjs) - only for a genuine
        # terminal success or a genuine final failure. "no_eligible_stage"
        # (a routine day with nothing to check yet) never pages the admin,
        # so this deliberately does NOT send an email every single day.
        id: notify
        if: always() && steps.final_summary.outputs.summary_file != ''
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node scripts/grandtour-auto-dry-run-notify.mjs "${{ steps.final_summary.outputs.summary_file }}" --run-url "$RUN_URL" --out-dir tmp

      - name: Send admin notification email
        # Requires five repository secrets (SMTP credentials for the
        # sending mailbox, plus the destination address) - see
        # docs/GRANDTOUR_APPLY_MODE_PRODUCTION_READINESS_CHECKLIST.md §17.9
        # for setup. Guarded on the job-level env vars above (mapped from
        # secrets.*, since `if:` cannot safely reference secrets.* itself)
        # so this step is skipped entirely - not failed - when any of them
        # are missing; "Notify - SMTP not configured" below prints a
        # visible notice for that case instead. Missing SMTP configuration
        # must never change the workflow's overall result from success to
        # failure.
        if: >
          always() &&
          steps.notify.outputs.should_send == 'true' &&
          env.SMTP_SERVER != '' &&
          env.SMTP_PORT != '' &&
          env.SMTP_USERNAME != '' &&
          env.SMTP_PASSWORD != '' &&
          env.ADMIN_EMAIL != ''
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: ${{ steps.notify.outputs.subject }}
          body: file://${{ steps.notify.outputs.body_path }}
          to: ${{ secrets.ADMIN_EMAIL }}
          from: GrandTour Automation <${{ secrets.SMTP_USERNAME }}>

      - name: Notify - SMTP not configured
        # Purely informational - never fails the job. Only prints when this
        # run actually had something worth emailing about
        # (steps.notify.outputs.should_send == 'true') but couldn't, because
        # one or more of the SMTP_SERVER/SMTP_PORT/SMTP_USERNAME/
        # SMTP_PASSWORD/ADMIN_EMAIL secrets are missing.
        if: >
          always() &&
          steps.notify.outputs.should_send == 'true' &&
          (env.SMTP_SERVER == '' || env.SMTP_PORT == '' || env.SMTP_USERNAME == '' || env.SMTP_PASSWORD == '' || env.ADMIN_EMAIL == '')
        run: |
          echo "::notice title=GrandTour admin email skipped::This run's outcome would normally email the admin, but one or more of the SMTP_SERVER/SMTP_PORT/SMTP_USERNAME/SMTP_PASSWORD/ADMIN_EMAIL repository secrets are not configured, so the email step was skipped. See docs/GRANDTOUR_APPLY_MODE_PRODUCTION_READINESS_CHECKLIST.md §17.9 to configure them. This does not affect the job's pass/fail result."

      - name: Upload auto dry-run report artifacts
        # Always uploads, even when the run step fails (exhausted retries,
        # an unsafe/review-required outcome, parser drift, or a
        # configuration error) - the whole run directory (every attempt's
        # report + summary, plus final-summary.json, which itself now
        # includes the resolved stageAvailabilityGraceHours/
        # allowRerunCompleted inputs), not just the last attempt.
        # if-no-files-found: ignore covers the rare case where a
        # configuration error prevents even a run directory from being
        # created (e.g. missing SUPABASE_URL) - the "Resolve effective
        # parameters" and "Print trigger diagnostics" steps above already
        # ran and are visible in the job log in that case.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grandtour-auto-dry-run-report
          path: tmp/auto-dry-runs/**
          if-no-files-found: ignore
