workflows:
  ios-testflight:
    name: iOS TestFlight (Codemagic)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic_tipping_api_key
    environment:
      node: lts
      xcode: latest
      cocoapods: default
      groups:
        - supabase_cloud
        - app_store_connect
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.tipping
      vars:
        BUNDLE_ID: "app.tipping"
        XCODE_WORKSPACE: "F1Tips.xcworkspace"
        XCODE_SCHEME: "F1Tips"
    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules
        - $CM_BUILD_DIR/apps/mobile/node_modules
        - $HOME/Library/Caches/CocoaPods
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
      cancel_previous_builds: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Verify required Expo public environment variables
        script: |
          test -n "$EXPO_PUBLIC_SUPABASE_URL" || (echo "EXPO_PUBLIC_SUPABASE_URL is required" && exit 1)
          test -n "$EXPO_PUBLIC_SUPABASE_ANON_KEY" || (echo "EXPO_PUBLIC_SUPABASE_ANON_KEY is required" && exit 1)
      - name: Typecheck mobile app
        script: |
          npm run typecheck --workspace apps/mobile
      - name: Run tipping-core tests
        script: |
          npm run test --workspace packages/tipping-core
      - name: Generate iOS native project
        script: |
          cd apps/mobile
          npx expo prebuild --platform ios --clean
      - name: Set iOS export compliance flag
        script: |
          PLIST="$CM_BUILD_DIR/apps/mobile/ios/$XCODE_SCHEME/Info.plist"
          PLIST_BUDDY=/usr/libexec/PlistBuddy
          $PLIST_BUDDY -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" || \
          $PLIST_BUDDY -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
      - name: Install CocoaPods dependencies
        script: |
          cd apps/mobile/ios
          pod install
      - name: Set up provisioning profiles
        script: |
          cd apps/mobile
          xcode-project use-profiles
      - name: Increment iOS build number
        script: |
          cd apps/mobile/ios

          echo "=============================================="
          echo "SETTING IOS BUILD NUMBER USING UTC TIMESTAMP"
          echo "=============================================="

          IOS_BUILD_NUMBER="$(date -u +%Y%m%d%H%M)"

          echo "Using iOS build number: $IOS_BUILD_NUMBER"

          # Safety check: Apple has already seen builds 1 and 2.
          if [ "$IOS_BUILD_NUMBER" -le 2 ]; then
            echo "ERROR: IOS_BUILD_NUMBER must be greater than 2."
            exit 1
          fi

          echo "IOS_BUILD_NUMBER=$IOS_BUILD_NUMBER" >> "$CM_ENV"

          echo "Applying build number with agvtool..."
          agvtool new-version -all "$IOS_BUILD_NUMBER" || true

          echo "Updating CFBundleVersion in all app Info.plist files..."

          find . -name "Info.plist" -print0 | while IFS= read -r -d '' plist; do
            if /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$plist" >/dev/null 2>&1; then
              /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $IOS_BUILD_NUMBER" "$plist" 2>/dev/null || \
              /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $IOS_BUILD_NUMBER" "$plist"

              echo "Updated $plist to CFBundleVersion $IOS_BUILD_NUMBER"
            fi
          done

          echo "Final CFBundleVersion values before IPA build:"

          find . -name "Info.plist" -print0 | while IFS= read -r -d '' plist; do
            if /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$plist" >/dev/null 2>&1; then
              echo "---- $plist"
              /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$plist" || true
              /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$plist" || true
            fi
          done
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/apps/mobile/ios/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
      - name: Verify IPA build number before publishing
        script: |
          cd "$CM_BUILD_DIR"

          echo "=============================================="
          echo "VERIFYING IPA BUILD NUMBER BEFORE PUBLISHING"
          echo "=============================================="

          IPA_PATH=$(find "$CM_BUILD_DIR" -name "*.ipa" | head -n 1)

          test -n "$IPA_PATH" || (echo "ERROR: No IPA found" && exit 1)

          echo "Found IPA: $IPA_PATH"

          rm -rf /tmp/ipa-check
          mkdir -p /tmp/ipa-check

          unzip -q "$IPA_PATH" -d /tmp/ipa-check

          APP_PLIST=$(find /tmp/ipa-check/Payload -name "Info.plist" | head -n 1)

          test -n "$APP_PLIST" || (echo "ERROR: No app Info.plist found inside IPA" && exit 1)

          FINAL_BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PLIST")
          FINAL_BUILD_NUMBER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_PLIST")
          FINAL_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_PLIST")

          echo "IPA CFBundleIdentifier: $FINAL_BUNDLE_ID"
          echo "IPA CFBundleShortVersionString: $FINAL_VERSION"
          echo "IPA CFBundleVersion: $FINAL_BUILD_NUMBER"
          echo "Expected CFBundleVersion: $IOS_BUILD_NUMBER"

          if [ "$FINAL_BUILD_NUMBER" != "$IOS_BUILD_NUMBER" ]; then
            echo "ERROR: IPA build number does not match expected build number."
            exit 1
          fi

          if [ "$FINAL_BUILD_NUMBER" -le 2 ]; then
            echo "ERROR: IPA build number must be greater than 2."
            exit 1
          fi

          echo "IPA build number verified successfully."
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
